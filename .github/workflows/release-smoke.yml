name: Release Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Release Smoke (if configured)
        id: release_smoke
        env:
          RELEASE_SMOKE_BASE_URL: ${{ secrets.RELEASE_SMOKE_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RELEASE_SMOKE_ALERT_TG_BOT_TOKEN: ${{ secrets.RELEASE_SMOKE_ALERT_TG_BOT_TOKEN }}
          RELEASE_SMOKE_ALERT_TG_CHAT_ID: ${{ secrets.RELEASE_SMOKE_ALERT_TG_CHAT_ID }}
        run: |
          if [ -z "${RELEASE_SMOKE_BASE_URL}" ]; then
            echo "RELEASE_SMOKE_BASE_URL is not configured. Skipping smoke."
            exit 0
          fi

          ARGS=(
            --base-url "${RELEASE_SMOKE_BASE_URL}"
            --strict-runtime
            --require-webhook-mode
            --require-render-persistent
            --check-mango-runtime
          )

          if [ -n "${TELEGRAM_BOT_TOKEN}" ]; then
            ARGS+=(--check-telegram-webhook --telegram-token-env TELEGRAM_BOT_TOKEN)
          fi

          python scripts/release_smoke.py "${ARGS[@]}"

      - name: Notify Telegram on smoke failure (optional)
        if: ${{ failure() }}
        env:
          RELEASE_SMOKE_BASE_URL: ${{ secrets.RELEASE_SMOKE_BASE_URL }}
          RELEASE_SMOKE_ALERT_TG_BOT_TOKEN: ${{ secrets.RELEASE_SMOKE_ALERT_TG_BOT_TOKEN }}
          RELEASE_SMOKE_ALERT_TG_CHAT_ID: ${{ secrets.RELEASE_SMOKE_ALERT_TG_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "${RELEASE_SMOKE_ALERT_TG_BOT_TOKEN}" ] || [ -z "${RELEASE_SMOKE_ALERT_TG_CHAT_ID}" ]; then
            echo "Release smoke alert secrets are not configured. Skipping Telegram notification."
            exit 0
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MESSAGE="Release smoke FAILED for ${RELEASE_SMOKE_BASE_URL}. Run: ${RUN_URL}"

          curl -s "https://api.telegram.org/bot${RELEASE_SMOKE_ALERT_TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${RELEASE_SMOKE_ALERT_TG_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" >/dev/null || true
